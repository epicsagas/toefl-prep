name: smoke-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install PyYAML
        run: pip3 install pyyaml
      - name: Validate plugin manifests
        run: |
          set -e
          for f in plugin.json .claude-plugin/marketplace.json .claude-plugin/plugin.json .codex-plugin/plugin.json; do
            python3 -c "import json; json.load(open('$f')); print('OK: $f')"
          done
      - name: Bash syntax check
        run: |
          for f in scripts/*.sh; do bash -n "$f" && echo "OK: $f"; done
      - name: Roadmap dry-run
        run: |
          mkdir -p /tmp/data
          cp skills/toefl/schedule.example.yaml /tmp/data/schedule.yaml
          TOEFL_DATA_DIR=/tmp/data scripts/roadmap.sh all 2026-07-15
          TOEFL_DATA_DIR=/tmp/data scripts/roadmap.sh json 2026-07-22 | python3 -c "import json,sys; json.load(sys.stdin)"
      - name: Init guard (no auto-write without consent)
        run: |
          rm -rf /tmp/empty && mkdir -p /tmp/empty
          set +e
          TOEFL_DATA_DIR=/tmp/empty scripts/roadmap.sh all 2026-07-15 </dev/null >/tmp/out 2>&1
          code=$?
          cat /tmp/out
          test "$code" -eq 2
          ! test -f /tmp/empty/schedule.yaml   # must NOT auto-create
          echo "OK: missing-schedule exits 2 without writing"
